name: Basic Checks

on:
  workflow_call:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          set -e
          BASE="origin/${{ github.base_ref || github.event.repository.default_branch }}"

          BAD=$(git log --pretty=format:"%H|%s%n%b%n---END---" "$BASE..HEAD" 2>/dev/null \
            | grep -iE "co-authored-by:.*(claude|codex|chatgpt|openai|anthropic)|🤖 generated with \[(claude|codex|gpt)" || true)

          if [ -n "$BAD" ]; then
            echo "::error::Disallowed trailer/footer detected in commit messages"
            echo "$BAD"
            exit 1
          fi
          echo "OK"

      - name: Validate PR body
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$PR_BODY" ]; then
            exit 0
          fi
          if echo "$PR_BODY" | grep -iqE "🤖 generated with \[(claude|codex|gpt)|co-authored.*(anthropic|openai)\.com"; then
            echo "::error::Disallowed trailer in PR body"
            echo "$PR_BODY" | grep -iE "🤖 generated with \[(claude|codex|gpt)|co-authored.*(anthropic|openai)\.com"
            exit 1
          fi
          echo "OK"
