name: Propagate rulesets to all repos

on:
  push:
    branches: [main]
  schedule:
    # 毎日 JST 午前3時 (UTC 18:00) にも念のため実行
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      import_from_nantokaworks:
        description: "nantokaworks からルールをインポートして rulesets/*.json に保存する（初回・更新時）"
        type: boolean
        default: false
      force:
        description: "ハッシュ一致でも強制再適用する"
        type: boolean
        default: false
      dry_run:
        description: "ドライラン（変更なし）"
        type: boolean
        default: false

permissions:
  contents: write  # ruleset-state.json / rulesets/*.json をコミットするために必要

jobs:
  # ─── import: nantokaworks → rulesets/*.json として保存 ───────────────────
  import:
    if: ${{ github.event.inputs.import_from_nantokaworks == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import rulesets from nantokaworks and save as JSON files
        env:
          GITHUB_TOKEN: ${{ secrets.RULESET_SYNC_PAT }}
        run: |
          python3 - <<'EOF'
          import json, os, pathlib, time, urllib.request, urllib.error

          ORG_NAME  = "nantokaworks"
          API_BASE  = "https://api.github.com"
          DEST_DIR  = pathlib.Path("rulesets")
          token     = os.environ["GITHUB_TOKEN"]

          def api_get(path):
              req = urllib.request.Request(
                  f"{API_BASE}{path}",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "ruleset-import/1.0",
                  },
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          print(f"Fetching {ORG_NAME} rulesets...")
          summaries = api_get(f"/orgs/{ORG_NAME}/rulesets")
          print(f"{len(summaries)} rulesets fetched")

          DEST_DIR.mkdir(exist_ok=True)
          for rs in summaries:
              detail = api_get(f"/orgs/{ORG_NAME}/rulesets/{rs['id']}")
              # API メタデータ（id, source 等）を除いた定義のみ保存
              definition = {
                  "name":        detail["name"],
                  "target":      detail.get("target", "branch"),
                  "enforcement": detail.get("enforcement", "active"),
                  "rules":       detail.get("rules", []),
                  "bypass_actors": detail.get("bypass_actors", []),
                  "conditions":  detail.get("conditions", {}),
              }
              fname = DEST_DIR / f"{detail['name']}.json"
              fname.write_text(json.dumps(definition, indent=2, ensure_ascii=False))
              print(f"  saved: {fname}")
              time.sleep(0.3)

          print("Done")
          EOF

      - name: Commit ruleset definitions
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rulesets/
          git diff --cached --quiet || git commit -m "chore: import ruleset definitions from nantokaworks [skip ci]"
          git push

  # ─── sync: rulesets/*.json → 全リポジトリへ伝播 ──────────────────────────
  sync:
    if: ${{ github.event.inputs.import_from_nantokaworks != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Propagate rulesets
        env:
          GITHUB_TOKEN: ${{ secrets.RULESET_SYNC_PAT }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python3 apply_rulesets.py $ARGS

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ruleset-state.json
          git diff --cached --quiet || git commit -m "chore: update ruleset-state.json [skip ci]"
          git push
