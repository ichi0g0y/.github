name: Propagate rulesets to all repos

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      import_from_nantokaworks:
        description: "nantokaworks からルールをインポートして .github に設定する（初回のみ）"
        type: boolean
        default: false
      force:
        description: "ハッシュ一致でも強制再適用する"
        type: boolean
        default: false
      dry_run:
        description: "ドライラン（変更なし）"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  import:
    if: ${{ github.event.inputs.import_from_nantokaworks == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Import rulesets from nantokaworks to .github
        env:
          GITHUB_TOKEN: ${{ secrets.RULESET_SYNC_PAT }}
        run: python3 import_from_nantokaworks.py

  sync:
    if: ${{ github.event.inputs.import_from_nantokaworks != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Propagate rulesets
        env:
          GITHUB_TOKEN: ${{ secrets.RULESET_SYNC_PAT }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python3 apply_rulesets.py $ARGS

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ruleset-state.json
          git diff --cached --quiet || git commit -m "chore: update ruleset-state.json [skip ci]"
          git push
