name: Propagate rulesets to all repos

on:
  push:
    branches: [main]
  schedule:
    # 毎日 JST 午前3時 (UTC 18:00) にも念のため実行
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "ハッシュ一致でも強制再適用する"
        type: boolean
        default: false
      dry_run:
        description: "ドライラン（変更なし）"
        type: boolean
        default: false

permissions:
  contents: write  # ruleset-state.json をコミットするために必要

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Propagate rulesets
        env:
          GITHUB_TOKEN: ${{ secrets.RULESET_SYNC_PAT }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python3 apply_rulesets.py $ARGS

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ruleset-state.json
          # 変更がなければコミットしない
          git diff --cached --quiet || git commit -m "chore: update ruleset-state.json [skip ci]"
          git push
