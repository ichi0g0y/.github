name: Propagate rulesets to all repos

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      import_from_nantokaworks:
        description: "nantokaworks からルールをインポートして .github に適用する（初回・更新時）"
        type: boolean
        default: false
      force:
        type: boolean
        default: false
      dry_run:
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ── import: nantokaworks → .github にルールセットを作成 ──────────────────────
  import:
    if: ${{ github.event.inputs.import_from_nantokaworks == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Import rulesets from nantokaworks and apply to .github
        env:
          GITHUB_TOKEN: ${{ secrets.RULESET_SYNC_PAT }}
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request, urllib.error

          ORG_NAME   = "nantokaworks"
          DEST_OWNER = "ichi0g0y"
          DEST_REPO  = ".github"
          API_BASE   = "https://api.github.com"
          token      = os.environ["GITHUB_TOKEN"]

          BYPASS_ACTORS = [
              {"actor_id": 5, "actor_type": "RepositoryRole", "bypass_mode": "always"}
          ]

          def api(method, path, body=None):
              url = f"{API_BASE}{path}"
              data = json.dumps(body).encode() if body else None
              req = urllib.request.Request(url, data=data, method=method, headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
                  "User-Agent": "ruleset-import/1.0",
              })
              try:
                  with urllib.request.urlopen(req) as resp:
                      raw = resp.read()
                      return json.loads(raw) if raw else {}
              except urllib.error.HTTPError as e:
                  print(f"HTTP {e.code} {method} {url}: {e.read().decode()}")
                  raise

          print("📋 nantokaworks のルールセットを取得中...")
          org_rulesets = api("GET", f"/orgs/{ORG_NAME}/rulesets")
          print(f" -> {len(org_rulesets)} 件: {[r['name'] for r in org_rulesets]}")

          for rs in org_rulesets:
              detail = api("GET", f"/orgs/{ORG_NAME}/rulesets/{rs['id']}")
              name   = detail["name"]
              payload = {
                  "name":        detail["name"],
                  "target":      detail.get("target", "branch"),
                  "enforcement": detail.get("enforcement", "active"),
                  "rules":       detail.get("rules", []),
                  "bypass_actors": BYPASS_ACTORS,
              }
              ref_name = detail.get("conditions", {}).get("ref_name")
              if ref_name:
                  payload["conditions"] = {"ref_name": ref_name}

              existing    = api("GET", f"/repos/{DEST_OWNER}/{DEST_REPO}/rulesets")
              existing_id = next((r["id"] for r in existing if r["name"] == name), None)

              if existing_id:
                  api("PUT", f"/repos/{DEST_OWNER}/{DEST_REPO}/rulesets/{existing_id}", payload)
                  print(f"✅ 更新: {DEST_REPO}/{name}")
              else:
                  api("POST", f"/repos/{DEST_OWNER}/{DEST_REPO}/rulesets", payload)
                  print(f"✅ 作成: {DEST_REPO}/{name}")

          print("\n完了: .github にルールセットを適用しました。")
          EOF

  # ── sync: .github のルールセットを全リポジトリに伝播 ─────────────────────────
  sync:
    if: ${{ github.event.inputs.import_from_nantokaworks != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Propagate rulesets
        env:
          GITHUB_TOKEN: ${{ secrets.RULESET_SYNC_PAT }}
        run: |
          # .github のブランチ保護で push できないため --force で常に全適用
          ARGS="--force"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python3 apply_rulesets.py $ARGS

  # ── sync-workflows: .github のワークフローを全リポジトリに伝播 ───────────────
  sync-workflows:
    if: ${{ github.event.inputs.import_from_nantokaworks != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Propagate workflows
        env:
          GITHUB_TOKEN: ${{ secrets.RULESET_SYNC_PAT }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="--dry-run"; fi
          python3 apply_workflows.py $ARGS
