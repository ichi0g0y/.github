name: Propagate rulesets to all repos

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      import_from_nantokaworks:
        description: "nantokaworks からルールをインポートして .github に設定する（初回のみ）"
        type: boolean
        default: false
      force:
        description: "ハッシュ一致でも強制再適用する"
        type: boolean
        default: false
      dry_run:
        description: "ドライラン（変更なし）"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  import:
    if: ${{ github.event.inputs.import_from_nantokaworks == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Import rulesets from nantokaworks to .github
        env:
          GITHUB_TOKEN: ${{ secrets.RULESET_SYNC_PAT }}
        run: |
          python3 - <<'EOF'
          import json, os, time, urllib.request, urllib.error

          ORG_NAME    = "nantokaworks"
          USER_NAME   = "ichi0g0y"
          TARGET_REPO = f"{USER_NAME}/.github"
          API_BASE    = "https://api.github.com"
          token       = os.environ["GITHUB_TOKEN"]

          def req(method, path, body=None):
              data = json.dumps(body).encode() if body else None
              r = urllib.request.Request(f"{API_BASE}{path}", data=data, method=method,
                  headers={"Authorization": f"Bearer {token}",
                           "Accept": "application/vnd.github+json",
                           "X-GitHub-Api-Version": "2022-11-28",
                           "Content-Type": "application/json",
                           "User-Agent": "import-rulesets/1.0"})
              with urllib.request.urlopen(r) as resp:
                  return json.loads(resp.read())

          def pages(path):
              results, url = [], f"{API_BASE}{path}?per_page=100"
              while url:
                  r = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json", "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "import-rulesets/1.0"})
                  with urllib.request.urlopen(r) as resp:
                      results.extend(json.loads(resp.read()))
                      lh = resp.headers.get("Link", "")
                      url = next((p.split(";")[0].strip().strip("<>") for p in lh.split(",") if 'rel="next"' in p), None)
              return results

          print(f"Fetching {ORG_NAME} rulesets...")
          summaries = pages(f"/orgs/{ORG_NAME}/rulesets")
          details = []
          for rs in summaries:
              if rs.get("target") == "repository":
                  print(f"  skip (target=repository): {rs['name']}")
                  continue
              details.append(req("GET", f"/orgs/{ORG_NAME}/rulesets/{rs['id']}"))
          print(f"  {len(details)} rulesets fetched")

          existing = {r["name"]: r["id"] for r in req("GET", f"/repos/{TARGET_REPO}/rulesets")}

          for d in details:
              p = {"name": d["name"], "target": d.get("target","branch"),
                   "enforcement": d.get("enforcement","active"),
                   "rules": d.get("rules",[]), "bypass_actors": d.get("bypass_actors",[])}
              ref = d.get("conditions",{}).get("ref_name")
              if ref: p["conditions"] = {"ref_name": ref}
              name = p["name"]
              if name in existing:
                  req("PUT", f"/repos/{TARGET_REPO}/rulesets/{existing[name]}", p)
                  print(f"  updated: {name}")
              else:
                  req("POST", f"/repos/{TARGET_REPO}/rulesets", p)
                  print(f"  created: {name}")
              time.sleep(0.3)
          print("Done")
          EOF

  sync:
    if: ${{ github.event.inputs.import_from_nantokaworks != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Propagate rulesets
        env:
          GITHUB_TOKEN: ${{ secrets.RULESET_SYNC_PAT }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python3 apply_rulesets.py $ARGS

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ruleset-state.json
          git diff --cached --quiet || git commit -m "chore: update ruleset-state.json [skip ci]"
          git push
